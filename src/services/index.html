<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Oráculo Mundial - Spectacular Demo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    body, html { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
    .particle { position: absolute; width: 8px; height: 8px; pointer-events: none; z-index: 100; border-radius: 50%; }
    .subtitle-text {
      position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
      color: white; font-size: 32px; font-weight: 700; text-align: center;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5); background: rgba(0,0,0,0.4);
      padding: 12px 40px; border-radius: 24px; backdrop-filter: blur(12px);
      opacity: 0; z-index: 200; border: 1px solid rgba(255,255,255,0.1);
    }
    .cta-button-3d {
      background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%);
      color: white; padding: 24px 60px; border-radius: 30px;
      font-size: 42px; font-weight: 900; text-transform: uppercase;
      box-shadow: 0 25px 60px rgba(168, 85, 247, 0.4); border: 2px solid rgba(255,255,255,0.2);
      cursor: pointer; italic: true;
    }
    .iphone-frame {
      position: relative; width: 480px; height: 980px; background: #1a1a1a;
      border: 16px solid #222; border-radius: 75px; overflow: hidden;
      box-shadow: 0 100px 200px rgba(0,0,0,0.9);
    }
  </style>
</head>
<body>
<div data-composition-id="spectacular-demo" data-width="1080" data-height="1920" style="background: #000; width: 1080px; height: 1920px; overflow: hidden; position: relative;">
  
  <!-- Luces de fondo -->
  <div id="ambient-light" style="position:absolute; width:100%; height:100%; background: radial-gradient(circle at 50% 50%, #2e1065 0%, #000 70%); opacity: 0.6;"></div>

  <!-- Audio -->
  <audio id="stadium-fx" src="https://assets.mixkit.co/sfx/preview/mixkit-stadium-crowd-cheering-loop-518.mp3" preload="auto"></audio>
  <audio id="confetti-fx" src="https://assets.mixkit.co/sfx/preview/mixkit-party-popper-explosion-1570.mp3" preload="auto"></audio>

  <!-- Mockup 3D -->
  <div id="phone-wrapper" style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 10;">
    <div class="iphone-frame">
      <video id="demo-video" src="../demos/video_generado.webm" style="width: 100%; height: 100%; object-fit: cover;"></video>
    </div>
  </div>

  <!-- Etiquetas -->
  <div id="label-1" style="position:absolute; left:150px; top:400px; color:white; opacity:0; z-index: 20;">
    <h1 style="font-size:70px; font-weight:900; margin:0; letter-spacing: -3px;">REAL-TIME</h1>
    <p style="color:#a855f7; font-size:28px; font-weight: 700;">Community Predictions</p>
  </div>

  <div id="label-2" style="position:absolute; right:150px; bottom:350px; color:white; opacity:0; z-index: 20;">
    <h1 style="font-size:70px; font-weight:900; margin:0; letter-spacing: -3px;">GLOBAL</h1>
    <p style="color:#10b981; font-size:28px; font-weight: 700;">Ranking & Competition</p>
  </div>

  <!-- UI Dinámica -->
  <div id="subtitles" class="subtitle-text"></div>
  <div id="cta-wrapper" style="position:absolute; left:50%; top:50%; transform:translate(-50%, -50%) scale(0); z-index:500; perspective: 1200px;">
    <div id="cta-button" class="cta-button-3d">Regístrate Ahora</div>
  </div>

  <script>
    window.__timelines = window.__timelines || {};
    
    function setSubtitle(text) {
      const el = document.getElementById('subtitles');
      el.innerText = text;
      gsap.to(el, { opacity: text ? 1 : 0, duration: 0.4, y: text ? 0 : 20 });
    }

    function launchConfetti() {
      document.getElementById('confetti-fx').play().catch(() => {});
      const colors = ['#a855f7', '#10b981', '#facc15', '#3b82f6', '#ef4444'];
      for(let i=0; i<100; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        p.style.left = '50%'; p.style.top = '50%';
        document.body.appendChild(p);
        gsap.to(p, {
          x: (Math.random() - 0.5) * 1800, y: (Math.random() - 0.5) * 1200,
          rotation: Math.random() * 1080, opacity: 0, scale: Math.random() * 3,
          duration: 3, ease: "power4.out", onComplete: () => p.remove()
        });
      }
    }

    const tl = gsap.timeline({ paused: true });

    // INTRO
    tl.add(() => document.getElementById('stadium-fx').play().catch(() => {}), 0);
    tl.add(() => setSubtitle("Bienvenidos al Oráculo Mundial 2026"), 0.5);
    tl.from("#phone-wrapper", { duration: 2.5, y: 1500, rotationX: 60, scale: 0.3, ease: "expo.out" }, 0);
    
    // PREDICCIONES
    tl.add(() => setSubtitle("Pronostica resultados en tiempo real"), 3);
    tl.to("#phone-wrapper", { duration: 2, x: -300, rotationY: 25, ease: "power4.inOut" }, 3.5);
    tl.to("#label-1", { duration: 1, opacity: 1, x: 40 }, "<");

    // RANKING & CONFETI
    tl.add(() => setSubtitle("Compite en el Ranking Global"), 7);
    tl.to("#label-1", { duration: 0.8, opacity: 0, x: -100 }, 7.5);
    tl.add(() => launchConfetti(), 8.2);
    tl.to("#phone-wrapper", { duration: 2, x: 320, rotationY: -20, scale: 1.1, ease: "power4.inOut" }, 8);
    tl.to("#label-2", { duration: 1, opacity: 1, y: -40 }, "<");

    // CIERRE
    tl.add(() => setSubtitle(""), 11);
    tl.to("#label-2", { duration: 0.8, opacity: 0 }, 11.5);
    tl.to("#phone-wrapper", { 
      duration: 2, x: 0, y: 0, rotationY: 0, rotationX: 0, 
      scale: 0.7, opacity: 0.2, filter: "blur(30px)", ease: "power2.inOut" 
    }, 12);

    // CTA FINAL
    tl.to("#cta-wrapper", { 
      duration: 1.5, scale: 1, ease: "elastic.out(1, 0.6)",
      onStart: () => setSubtitle("¡Únete a la victoria!")
    }, 13.5);
    tl.from("#cta-button", { duration: 2, rotationX: -90, rotationY: 30, ease: "expo.out" }, 13.5);
    tl.to("#cta-button", { y: -15, duration: 2, repeat: -1, yoyo: true, ease: "sine.inOut" }, 15);

    tl.to({}, { duration: 2 }); // Buffer final

    window.__timelines["spectacular-demo"] = tl;
    window.__hf = {
      duration: () => tl.duration(),
      seek: (t) => {
        const video = document.getElementById('demo-video');
        if (video) video.currentTime = t; 
        tl.time(t);
      }
    };
  </script>
</div>
</body>
</html>
